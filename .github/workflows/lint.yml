name: lint

# Static checks against the repo. Catches the kind of issue that
# bit us mid-install (shell typos, AUR/pacman package renames,
# Hyprland binding conflicts) before they reach a fresh install.
#
# Tracking issue: #5

# Auto-triggers disabled per user directive — workflow can still be invoked
# manually from the Actions tab via "Run workflow" if you want to re-enable
# the static checks. Re-enable by restoring:
#   on:
#     push:
#       branches: [main]
#     pull_request:
on:
  workflow_dispatch:

jobs:
  pacman-package-check:
    name: pacman packages exist in extra
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync pacman DB
        run: pacman -Sy --noconfirm
      - name: Verify every pacman -S package in postinstall.sh exists
        shell: bash
        run: |
          set -euo pipefail
          # Extract package names from `sudo pacman -Syu --noconfirm --needed \\` blocks.
          # Stops at the first standalone `\` line that's not followed by another package
          # (i.e., the end of the heredoc). Crude but works for the patterns we use.
          missing=()
          while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              [[ "$pkg" == "#"* ]] && continue
              # Sanity-check via pacman -Si (extra repo) first, then pacman -Sg (groups)
              if ! pacman -Si "$pkg" >/dev/null 2>&1 \
                && ! pacman -Sg "$pkg" >/dev/null 2>&1; then
                  missing+=("$pkg")
              fi
          done < <(
              # Rule order matters: terminate (p=0) BEFORE capture, otherwise the
              # next non-indented `sudo ...` line gets captured as packages. Also
              # filter tokens to strict pacman package-name shape (lowercase /
              # digits / + . _ -) to drop `--overwrite '/boot/memtest86+/*'` flags
              # and the like.
              awk '/^sudo pacman -S(yu)? .*--needed.*\\$/ {p=1; next}
                   p && /^[^[:space:]]/ {p=0; next}
                   p && /^[[:space:]]+[a-z0-9]/ {
                       gsub(/\\$/, "")
                       for (i=1; i<=NF; i++)
                           if ($i ~ /^[a-z0-9][a-z0-9+._-]*$/) print $i
                   }' phase-3-arch-postinstall/postinstall.sh
          )
          if (( ${#missing[@]} )); then
              printf 'pacman -Si could not find these packages:\n'
              printf '  - %s\n' "${missing[@]}"
              exit 1
          fi
          echo "All pacman packages in postinstall.sh §1 + §1-print resolve in extra."

  aur-package-check:
    name: AUR packages exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every AUR package in postinstall.sh resolves on aur.archlinux.org
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              [[ "$pkg" == "#"* ]] && continue
              # AUR RPC API: returns {"resultcount":0} if missing.
              count=$(curl -fsS "https://aur.archlinux.org/rpc?v=5&type=info&arg[]=$pkg" \
                  | jq -r '.resultcount // 0')
              if (( count == 0 )); then
                  missing+=("$pkg")
              fi
          done < <(
              # AUR_PACKAGES=( ... ) array in postinstall.sh §3
              awk '/^AUR_PACKAGES=\(/ {p=1; next}
                   p && /^\s*[a-z0-9].*-(bin|git|native)?$/ { gsub(/[^a-zA-Z0-9_+.-]/, ""); print }
                   p && /^\)/ {p=0}' phase-3-arch-postinstall/postinstall.sh
          )
          if (( ${#missing[@]} )); then
              printf 'AUR RPC could not find these packages:\n'
              printf '  - %s\n' "${missing[@]}"
              exit 1
          fi
          echo "All AUR packages in postinstall.sh §3 resolve on aur.archlinux.org."

  pam-stack-syntax:
    name: PAM stacks parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shape-check PAM stacks under phase-3 system-files/pam.d/
        shell: bash
        run: |
          set -euo pipefail
          # Valid PAM types (optionally `-` prefix to suppress log on missing module).
          VALID_TYPES='^-?(auth|account|session|password)$'
          # Single-word controls. Bracket form `[name=value ...]` is handled separately.
          VALID_CONTROLS='^(required|requisite|sufficient|optional|include|substack)$'
          errors=0
          for file in phase-3-arch-postinstall/system-files/pam.d/*; do
              [[ -f "$file" ]] || continue
              line_no=0
              while IFS= read -r raw || [[ -n "$raw" ]]; do
                  line_no=$((line_no+1))
                  line="${raw%%#*}"
                  line="${line%"${line##*[![:space:]]}"}"
                  [[ -z "${line// }" ]] && continue
                  line="${line#"${line%%[![:space:]]*}"}"
                  type="${line%%[[:space:]]*}"
                  if ! [[ "$type" =~ $VALID_TYPES ]]; then
                      echo "$file:$line_no: unknown PAM type '$type'"
                      errors=$((errors+1)); continue
                  fi
                  rest="${line#"$type"}"
                  rest="${rest#"${rest%%[![:space:]]*}"}"
                  if [[ "$rest" == "["* ]]; then
                      if ! [[ "$rest" == *"]"* ]]; then
                          echo "$file:$line_no: unclosed bracket-form control"
                          errors=$((errors+1)); continue
                      fi
                      rest="${rest#*]}"
                      rest="${rest#"${rest%%[![:space:]]*}"}"
                  else
                      control="${rest%%[[:space:]]*}"
                      if ! [[ "$control" =~ $VALID_CONTROLS ]]; then
                          echo "$file:$line_no: invalid control '$control'"
                          errors=$((errors+1)); continue
                      fi
                      rest="${rest#"$control"}"
                      rest="${rest#"${rest%%[![:space:]]*}"}"
                  fi
                  module="${rest%%[[:space:]]*}"
                  if [[ -z "$module" ]]; then
                      echo "$file:$line_no: missing module"
                      errors=$((errors+1)); continue
                  fi
              done < "$file"
          done
          if (( errors > 0 )); then
              echo
              echo "Found $errors PAM stack syntax issue(s)."
              exit 1
          fi
          echo "All PAM stacks parse cleanly."

  docs-link-check:
    name: docs/runbook internal links resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify every internal markdown link in docs/ + runbook/ + README.md resolves
        shell: bash
        run: |
          set -euo pipefail
          errors=0
          while IFS= read -r match; do
              file="${match%%:*}"
              rest="${match#*:}"
              line_no="${rest%%:*}"
              capture="${rest#*:}"
              # Skip external + anchor-only links.
              case "$capture" in
                  http://*|https://*|mailto:*|\#*) continue ;;
              esac
              # Strip anchor and query suffixes.
              target="${capture%%#*}"
              target="${target%%\?*}"
              [[ -z "$target" ]] && continue
              if [[ "$target" == /* ]]; then
                  resolved=".$target"
              else
                  resolved="$(dirname "$file")/$target"
              fi
              resolved="$(realpath -m --relative-to=. "$resolved" 2>/dev/null || echo "$resolved")"
              if [[ ! -e "$resolved" ]]; then
                  echo "$file:$line_no: broken link → $target"
                  errors=$((errors+1))
              fi
          done < <(grep -RnoP '(?<=\]\()[^)]+(?=\))' docs/ runbook/ README.md)
          if (( errors > 0 )); then
              echo
              echo "Found $errors broken internal link(s)."
              exit 1
          fi
          echo "All internal links in docs/ + runbook/ + README.md resolve."
