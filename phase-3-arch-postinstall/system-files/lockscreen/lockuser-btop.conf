#! Custom btop config for `lockuser` — used by the btop-lock lockscreen.
#! lockuser has no chezmoi-managed dotfiles; this file is installed by
#! postinstall.sh §1g into /var/lib/lockuser/.config/btop/btop.conf.

#* Update time in milliseconds — snappier at-a-distance read.
update_ms = 500

#* Optional filter for shown disks, full mountpoints separated by comma.
#* Exclude-mode (the `exclude=` prefix flips the filter) — drops btrfs-subvol
#* duplicates of cryptroot and the 1G EFI, but keeps USB sticks / SD cards
#* under /run/media so they show up when plugged in.
disks_filter = "exclude=/.snapshots,/swap,/boot"
