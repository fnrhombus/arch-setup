# Activate systemd-oomd memory-pressure monitoring on the user slice.
# When sustained PSI within user.slice exceeds DefaultMemoryPressureLimit
# for DefaultMemoryPressureDurationSec (both in oomd.conf), oomd picks the
# descendant cgroup with the highest pressure and SIGKILLs it.
#
# This is the safety net that should fire before the kernel OOM killer can
# reach into the wayland-wm@hyprland-uwsm.desktop.service cgroup and bring
# the whole session down.

[Slice]
ManagedOOMMemoryPressure=kill
