# systemd-oomd thresholds — set by arch-setup
#
# Kill cgroups under managed slices when sustained memory pressure (PSI "full")
# stays above 50% for 20s, or when system swap usage exceeds 85%.
#
# Defaults (60% / 30s / 90%) let pressure build long enough that the kernel
# OOM killer can fire first inside the wayland compositor cgroup, taking the
# whole session down.

[OOM]
SwapUsedLimit=85%
DefaultMemoryPressureLimit=50%
DefaultMemoryPressureDurationSec=20s
