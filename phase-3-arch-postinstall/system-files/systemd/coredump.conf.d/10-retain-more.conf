# Coredump retention — set by arch-setup
#
# Default MaxUse caps core storage at ~1G of free space, which ages out
# cores after ~20 segfaults for apps that core at ~50M (msedge in
# particular). Bump retention so a debugging window survives multiple
# crashes worth of evidence.

[Coredump]
Storage=external
MaxUse=5G
KeepFree=2G
