# greetd — Wayland greeter daemon. Replaces SDDM per docs/decisions.md §D.
# Installed by postinstall.sh (script-implementation pass) to /etc/greetd/config.toml.
#
# `command` runs ReGreet which then launches Hyprland after authentication.
#
# NO `[initial_session]` section: greetd treats the TOML section header as
# a hard declaration, so even a header with all properties commented out
# crashes the daemon with "initial_session contains no command" and it
# restart-loops until start-limit-hit. Autologin is off by design; if
# ever wanted, add the block back as:
#     [initial_session]
#     command = "Hyprland"
#     user = "tom"

[terminal]
vt = 1

[default_session]
# ReGreet takes NO positional session argument. It reads the session list
# from /usr/share/wayland-sessions/*.desktop and lets the user pick in
# its UI (with Hyprland as the default once hyprland.desktop is present).
# `-- hyprland` makes regreet's clap parser error with
# "unexpected argument 'hyprland' found".
command = "regreet -l debug"
user = "greeter"
