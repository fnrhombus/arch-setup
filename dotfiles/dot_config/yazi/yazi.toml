# yazi — TUI file manager. Theme is matugen-rendered to theme.toml
# (separate file).

[manager]
ratio          = [1, 4, 3]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "size"
show_hidden    = false
show_symlink   = true
scrolloff      = 5
mouse_events   = ["click", "scroll"]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit       = [{ run = 'helix "$@"',          desc = "Helix",   block = true, for = "unix" }]
open       = [{ run = 'xdg-open "$@"',       desc = "Open",    for = "unix" }]
reveal     = [{ run = 'nautilus "$(dirname "$1")"', desc = "Reveal in Nautilus", for = "unix" }]
extract    = [{ run = 'ouch d -y "$@"',      desc = "Extract", for = "unix" }]
play       = [{ run = 'mpv "$@"',            orphan = true,    for = "unix" }]
view-image = [{ run = 'imv "$@"',            orphan = true,    for = "unix" }]
view-pdf   = [{ run = 'zathura "$@"',        orphan = true,    for = "unix" }]

[open]
rules = [
    { name = "*/", use = ["edit", "open", "reveal"] },
    { mime = "text/*",            use = ["edit", "reveal"] },
    { mime = "image/*",           use = ["view-image", "reveal"] },
    { mime = "application/pdf",   use = ["view-pdf", "reveal"] },
    { mime = "video/*",           use = ["play", "reveal"] },
    { mime = "audio/*",           use = ["play", "reveal"] },
    { mime = "application/zip",   use = ["extract", "reveal"] },
    { mime = "application/gzip",  use = ["extract", "reveal"] },
    { mime = "application/x-tar", use = ["extract", "reveal"] },
    { mime = "*",                 use = ["open", "reveal"] },
]
