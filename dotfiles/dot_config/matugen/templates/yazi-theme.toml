# yazi theme — generated by matugen.
#
# Schema rewrite landed in yazi 25.x (see preset/theme-dark.toml on main):
#   [manager] → [mgr]
#   tab_active / tab_inactive → [tabs] active / inactive
#   hovered + preview_hovered (top-level) → [indicator] current / preview
#   [select] → [pick]
# marker_*, count_*, find_*, border_*, cwd, symlink_target stay in [mgr].

[mgr]
cwd = { fg = "{{colors.primary.default.hex}}" }

find_keyword  = { fg = "{{colors.primary.default.hex}}", bold = true, italic = true, underline = true }
find_position = { fg = "{{colors.tertiary.default.hex}}", bg = "reset", bold = true, italic = true }

marker_copied   = { fg = "{{colors.tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.primary.default.hex}}",   bg = "{{colors.primary.default.hex}}" }
marker_selected = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

count_copied   = { fg = "{{colors.on_tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}" }
count_cut      = { fg = "{{colors.on_error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

border_symbol = "│"
border_style  = { fg = "{{colors.outline.default.hex}}" }

[tabs]
active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
inactive = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }

[indicator]
# Replaces the pre-25.x `hovered` / `preview_hovered` settings under [manager].
parent  = { reversed = true }
current = { reversed = true }
preview = { underline = true }

[mode]
normal_main = { fg = "{{colors.on_primary.default.hex}}",   bg = "{{colors.primary.default.hex}}",   bold = true }
normal_alt  = { fg = "{{colors.primary.default.hex}}",      bg = "{{colors.surface_container.default.hex}}" }
select_main = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.secondary.default.hex}}",    bg = "{{colors.surface_container.default.hex}}" }
unset_main  = { fg = "{{colors.on_error.default.hex}}",     bg = "{{colors.error.default.hex}}",     bold = true }
unset_alt   = { fg = "{{colors.error.default.hex}}",        bg = "{{colors.surface_container.default.hex}}" }

[status]
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = {}
value    = {}
selected = { reversed = true }

[pick]
# Renamed from [select] in yazi 25.x.
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "{{colors.primary.default.hex}}" }
inactive = {}

[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = {}
hovered = { underline = true }

[which]
mask            = { bg = "{{colors.surface_container.default.hex}}" }
cand            = { fg = "{{colors.tertiary.default.hex}}" }
rest            = { fg = "{{colors.outline.default.hex}}" }
desc            = { fg = "{{colors.primary.default.hex}}" }
separator       = "  "
separator_style = { fg = "{{colors.outline.default.hex}}" }
