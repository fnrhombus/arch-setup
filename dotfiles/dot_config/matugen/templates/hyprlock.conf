# hyprlock colors — sourced by ~/.config/hypr/hyprlock.conf via $include.
# Hyprlock uses the same rgb()/rgba() syntax as hyprland.conf.
#
# Same theme philosophy as the other templates: lock screen surfaces
# stay grey regardless of wallpaper; accent (focus ring, type indicator)
# follows the wallpaper.

# Static fills (VS Code Default Dark+)
$bg_color    = rgb(1e1e1e)
$fg_color    = rgb(d4d4d4)
$surface     = rgb(2d2d30)
$outline     = rgb(3c3c3c)

# Matugen-derived accents
$accent      = rgb({{colors.primary.default.hex_stripped}})
$accent_dim  = rgba({{colors.primary.default.hex_stripped}}99)
$error       = rgb({{colors.error.default.hex_stripped}})
