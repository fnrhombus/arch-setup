# fuzzel — STATIC VS Code-grey fills + matugen accents.
# Sourced from ~/.config/fuzzel/fuzzel.ini via include=.
# Hex without leading # per fuzzel convention; trailing 2 hex digits = alpha.

[colors]
# Static fills (VS Code Default Dark+, ee suffix = ~93% opaque panel)
background=2d2d30ee
text=d4d4d4ff
# Matugen-derived accents
match={{colors.primary.default.hex_stripped}}ff
selection={{colors.primary_container.default.hex_stripped}}ff
selection-text={{colors.on_primary_container.default.hex_stripped}}ff
selection-match={{colors.primary.default.hex_stripped}}ff
border={{colors.primary.default.hex_stripped}}ff

[border]
radius=8
width=2
