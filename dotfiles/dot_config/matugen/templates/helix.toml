# Helix theme — generated by matugen. Activated via `theme = "matugen"` in
# ~/.config/helix/config.toml.

# UI roles
"ui.background" = { bg = "background" }
"ui.text" = { fg = "on_background" }
"ui.cursor" = { fg = "background", bg = "primary" }
"ui.cursor.primary" = { fg = "background", bg = "primary" }
"ui.cursor.match" = { fg = "primary", modifiers = ["bold"] }
"ui.linenr" = { fg = "outline" }
"ui.linenr.selected" = { fg = "primary", modifiers = ["bold"] }
"ui.statusline" = { fg = "on_surface", bg = "surface_container" }
"ui.statusline.inactive" = { fg = "outline", bg = "surface" }
"ui.statusline.normal" = { fg = "on_primary", bg = "primary" }
"ui.statusline.insert" = { fg = "on_tertiary", bg = "tertiary" }
"ui.statusline.select" = { fg = "on_secondary", bg = "secondary" }
"ui.popup" = { bg = "surface_container_high" }
"ui.window" = { fg = "outline" }
"ui.help" = { bg = "surface_container", fg = "on_surface" }
"ui.menu" = { bg = "surface_container", fg = "on_surface" }
"ui.menu.selected" = { bg = "primary_container", fg = "on_primary_container" }
"ui.selection" = { bg = "primary_container" }
"ui.selection.primary" = { bg = "primary_container" }
"ui.virtual.whitespace" = { fg = "outline_variant" }
"ui.virtual.indent-guide" = { fg = "outline_variant" }

# Diagnostics
"diagnostic.error" = { underline = { color = "error", style = "curl" } }
"diagnostic.warning" = { underline = { color = "tertiary", style = "curl" } }
"diagnostic.info" = { underline = { color = "secondary", style = "curl" } }
"diagnostic.hint" = { underline = { color = "outline", style = "curl" } }

# Syntax — minimal, leans on accent + secondary + tertiary
keyword = { fg = "primary", modifiers = ["bold"] }
"keyword.control" = { fg = "primary" }
"keyword.operator" = { fg = "tertiary" }
"keyword.directive" = { fg = "secondary" }
function = { fg = "tertiary" }
"function.builtin" = { fg = "tertiary", modifiers = ["italic"] }
"function.method" = { fg = "tertiary" }
type = { fg = "secondary" }
"type.builtin" = { fg = "secondary", modifiers = ["italic"] }
constant = { fg = "primary" }
"constant.numeric" = { fg = "tertiary" }
"constant.builtin" = { fg = "primary", modifiers = ["italic"] }
"constant.character.escape" = { fg = "secondary" }
string = { fg = "tertiary" }
"string.regexp" = { fg = "secondary" }
comment = { fg = "outline", modifiers = ["italic"] }
operator = { fg = "on_surface" }
variable = { fg = "on_background" }
"variable.builtin" = { fg = "secondary", modifiers = ["italic"] }
"variable.parameter" = { fg = "on_surface", modifiers = ["italic"] }
namespace = { fg = "secondary", modifiers = ["italic"] }
attribute = { fg = "tertiary" }
constructor = { fg = "secondary" }
tag = { fg = "primary" }
label = { fg = "primary", modifiers = ["italic"] }

# Markup
"markup.heading" = { fg = "primary", modifiers = ["bold"] }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.link.url" = { fg = "tertiary", modifiers = ["underlined"] }
"markup.link.text" = { fg = "primary" }
"markup.list" = { fg = "secondary" }
"markup.quote" = { fg = "outline", modifiers = ["italic"] }
"markup.raw" = { fg = "tertiary" }

# Diff
"diff.plus" = "tertiary"
"diff.minus" = "error"
"diff.delta" = "primary"

[palette]
background                   = "{{colors.background.default.hex}}"
on_background                = "{{colors.on_background.default.hex}}"
surface                      = "{{colors.surface.default.hex}}"
surface_container            = "{{colors.surface_container.default.hex}}"
surface_container_high       = "{{colors.surface_container_high.default.hex}}"
on_surface                   = "{{colors.on_surface.default.hex}}"
outline                      = "{{colors.outline.default.hex}}"
outline_variant              = "{{colors.outline_variant.default.hex}}"
primary                      = "{{colors.primary.default.hex}}"
on_primary                   = "{{colors.on_primary.default.hex}}"
primary_container            = "{{colors.primary_container.default.hex}}"
on_primary_container         = "{{colors.on_primary_container.default.hex}}"
secondary                    = "{{colors.secondary.default.hex}}"
on_secondary                 = "{{colors.on_secondary.default.hex}}"
tertiary                     = "{{colors.tertiary.default.hex}}"
on_tertiary                  = "{{colors.on_tertiary.default.hex}}"
error                        = "{{colors.error.default.hex}}"
on_error                     = "{{colors.on_error.default.hex}}"
