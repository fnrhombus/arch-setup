# matugen-rendered tmux colors — sourced by ~/.tmux.conf via `source -q`.
# Auto-regenerated on every wallpaper change; do not hand-edit.
#
# Reload: `prefix + R` (re-sources ~/.tmux.conf which re-sources this file),
# or `tmux source ~/.tmux.conf` from any shell. matugen's post_hook below
# also calls `tmux source` so a wallpaper change updates running sessions.

set -g status-style "fg=#{{colors.on_surface.default.hex_stripped}},bg=#{{colors.surface_container.default.hex_stripped}}"

set -g status-left-style  "fg=#{{colors.on_primary.default.hex_stripped}},bg=#{{colors.primary.default.hex_stripped}},bold"
set -g status-right-style "fg=#{{colors.on_secondary.default.hex_stripped}},bg=#{{colors.secondary.default.hex_stripped}}"

setw -g window-status-style          "fg=#{{colors.on_surface.default.hex_stripped}},bg=#{{colors.surface_container.default.hex_stripped}}"
setw -g window-status-current-style  "fg=#{{colors.on_primary.default.hex_stripped}},bg=#{{colors.primary.default.hex_stripped}},bold"

set -g pane-border-style         "fg=#{{colors.outline.default.hex_stripped}}"
set -g pane-active-border-style  "fg=#{{colors.primary.default.hex_stripped}}"

set -g message-style       "fg=#{{colors.on_secondary.default.hex_stripped}},bg=#{{colors.secondary.default.hex_stripped}}"
set -g message-command-style "fg=#{{colors.on_tertiary.default.hex_stripped}},bg=#{{colors.tertiary.default.hex_stripped}}"

set -g mode-style          "fg=#{{colors.on_primary.default.hex_stripped}},bg=#{{colors.primary.default.hex_stripped}}"
