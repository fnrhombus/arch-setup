# Hyprland color variables — sourced by hyprland.conf via `source = ./colors.conf`
#
# Design: STATIC dark grey palette (VS Code Default Dark+ inspired) for
# fills + text, matugen-derived only for accents (window borders, focus
# indicators). Wallpaper changes shift the active-border tint without
# repainting the entire desktop in wallpaper hues.

# ---- Static fills (VS Code Default Dark+) ----
$background         = rgb(1e1e1e)
$surface            = rgb(252526)
$surface_container  = rgb(2d2d30)
$surface_high       = rgb(3c3c3c)
$on_surface         = rgb(d4d4d4)
$on_surface_muted   = rgb(969696)
$outline            = rgb(3c3c3c)
$outline_variant    = rgb(464647)

# ---- Matugen-derived accents (wallpaper-tinted) ----
$primary            = rgb({{colors.primary.default.hex_stripped}})
$on_primary         = rgb({{colors.on_primary.default.hex_stripped}})
$primary_container  = rgb({{colors.primary_container.default.hex_stripped}})

$secondary          = rgb({{colors.secondary.default.hex_stripped}})
$tertiary           = rgb({{colors.tertiary.default.hex_stripped}})
$error              = rgb({{colors.error.default.hex_stripped}})

general {
    # Active border = matugen accent gradient (the only place wallpaper
    # tint shows up on Hyprland chrome). Inactive = subtle static grey.
    col.active_border   = $primary $tertiary 45deg
    col.inactive_border = $outline
}

decoration {
    shadow {
        color = rgba(000000aa)
    }
}
