# matugen pipeline — generates Material You palette from current wallpaper
# and renders templates to all theme-aware components.
#
# Invoked by ~/.local/bin/theme-toggle and ~/.local/bin/wallpaper-rotate.
# Manual run: matugen image ~/Pictures/Wallpapers/<file>.{jpg,png}

[config]
# We drive reloads from theme-toggle directly so each template's hook is optional.
reload_apps = false
custom_colors = {}

# ---- Component templates ----

[templates.waybar]
input_path = "~/.config/matugen/templates/waybar.css"
output_path = "~/.config/waybar/colors.css"
post_hook = "pkill -SIGUSR2 waybar 2>/dev/null || true"

[templates.swaync]
input_path = "~/.config/matugen/templates/swaync.css"
output_path = "~/.config/swaync/colors.css"
post_hook = "swaync-client --reload-css 2>/dev/null || true"

[templates.fuzzel]
input_path = "~/.config/matugen/templates/fuzzel.ini"
output_path = "~/.config/fuzzel/colors.ini"
# fuzzel re-reads on every launch; no reload hook needed.

[templates.ghostty]
input_path = "~/.config/matugen/templates/ghostty-theme"
output_path = "~/.config/ghostty/themes/matugen"
# Ghostty config references theme = matugen; live reload via SIGUSR2.
post_hook = "pkill -SIGUSR2 ghostty 2>/dev/null || true"

[templates.hypr-colors]
input_path = "~/.config/matugen/templates/hypr-colors.conf"
output_path = "~/.config/hypr/colors.conf"
post_hook = "hyprctl reload 2>/dev/null || true"

[templates.hyprlock]
input_path = "~/.config/matugen/templates/hyprlock.conf"
output_path = "~/.config/hypr/hyprlock.colors.conf"
# hyprlock reads on launch; no reload needed.

[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk.css"
output_path = "~/.config/gtk-3.0/gtk.css"

[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk.css"
output_path = "~/.config/gtk-4.0/gtk.css"

[templates.qt5]
input_path = "~/.config/matugen/templates/qt.conf"
output_path = "~/.config/qt5ct/colors/matugen.conf"

[templates.qt6]
input_path = "~/.config/matugen/templates/qt.conf"
output_path = "~/.config/qt6ct/colors/matugen.conf"

[templates.yazi]
input_path = "~/.config/matugen/templates/yazi-theme.toml"
output_path = "~/.config/yazi/theme.toml"

[templates.zathura]
input_path = "~/.config/matugen/templates/zathurarc"
# Render to a sidecar file that the chezmoi-managed `zathurarc` pulls in via
# zathura's `include` directive (zathurarc(5)). Avoids the stomp where matugen
# and chezmoi both wrote to ~/.config/zathura/zathurarc.
output_path = "~/.config/zathura/colors.zathurarc"

[templates.helix]
input_path = "~/.config/matugen/templates/helix.toml"
output_path = "~/.config/helix/themes/matugen.toml"

# Greeter CSS: rendered to user cache; postinstall installs to /etc/greetd/
# during reinstall. Live theme-following for the greeter is deferred (would
# require a polkit rule for the cp; greeter is only seen at cold boot anyway).
[templates.regreet]
input_path = "~/.config/matugen/templates/regreet.css"
output_path = "~/.cache/matugen/regreet.css"
