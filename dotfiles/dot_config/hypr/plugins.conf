# Plugin-specific config lives in post-plugins.conf, which is sourced
# at runtime by the hyprpm bootstrap planter via `hyprctl keyword
# source ...` AFTER plugins have been installed and enabled. Doing it
# this way means the initial Hyprland config parse never references
# unloaded plugins (which would raise the sticky red 'Configuration
# Errors' overlay).
#
# Currently in use:
#   - hyprexpo  (Mission-Control-style overview, bound to Super+grave)
#   - hyprgrass (touch gesture engine, gestures defined inline)
#
# This file intentionally has no plugin {} blocks — they all live in
# post-plugins.conf instead.
