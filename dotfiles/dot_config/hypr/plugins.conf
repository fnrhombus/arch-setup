# Plugins — managed via hyprpm. Listed here for documentation; actual
# `hyprpm add ...` lines live in postinstall.sh §13b (or whatever
# follows the chezmoi apply step).
#
# Currently in use:
#   - hyprexpo  (Mission-Control-style overview, bound to Super+grave)
#   - hyprgrass (touch gesture engine — config in input.conf)

plugin {
    hyprexpo {
        columns          = 3
        gap_size         = 5
        # bg_col set via colors.conf: $surface
        bg_col           = $surface
        workspace_method = center current
        # Touch/swipe enabled via the unified `hyprexpo-gesture` key (modern
        # API). The deprecated `enable_gesture` / `gesture_positive` /
        # `gesture_negative` / `gesture_fingers` keys were removed upstream
        # by Hyprland 0.51's gestures rewrite — using them logs warnings
        # and may silently no-op.
        gesture_distance = 300
    }
}
