# Plugins — managed via hyprpm. Listed here for documentation; actual
# `hyprpm add ...` lines live in postinstall.sh §13b (or whatever
# follows the chezmoi apply step).
#
# Currently in use:
#   - hyprexpo  (Mission-Control-style overview, bound to Super+grave)
#   - hyprgrass (touch gesture engine — config in input.conf)

plugin {
    hyprexpo {
        columns          = 3
        gap_size         = 5
        # bg_col set via colors.conf: $surface
        bg_col           = $surface
        workspace_method = center current
        # Touch gestures are handled by hyprgrass (input.conf); hyprexpo's
        # own gesture_* keys were removed upstream in Hyprland 0.51's
        # gestures rewrite. `gesture_distance` was also reinterpreted by
        # Hyprland 0.54+ as a finger-count key and chokes on the old
        # pixel value with "Invalid value 300 for finger count" — leave
        # it out and rely on hyprgrass for gesture handling.
    }
}
