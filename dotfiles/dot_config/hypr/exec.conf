# Startup — exec-once runs at session start; exec runs on every config reload.
#
# CAUTION: `exec-once` lines DO NOT serialize — they fire in parallel.
# Listing wallpaper-rotate first doesn't make Hyprland wait for it
# before starting waybar. Without an explicit delay, waybar can start
# while matugen is mid-write of colors.css, hit a partial file, and
# exit silently. Wrap waybar (and any matugen-CSS-importing daemon)
# in a 1.5s sleep so matugen's render completes first. Empirically
# matugen renders in <500ms, so 1.5s is comfortable headroom.
# (Fallback ~/.config/{waybar,swaync}/create_colors.css from chezmoi
# protects against the case where matugen fails entirely.)

# 1. Initial wallpaper + matugen render — sets the colors.css files
#    everything else imports.
exec-once = ~/.local/bin/wallpaper-rotate --first

# 2. CSS-importing daemons. Sleep 1.5s lets matugen finish writing
#    colors.css before waybar/swaync try to read it.
exec-once = sh -c 'sleep 1.5 && exec waybar'
exec-once = sh -c 'sleep 1.5 && exec swaync'
exec-once = awww-daemon
exec-once = wl-paste --watch cliphist store
exec-once = swayosd-server
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = systemctl --user start xdg-desktop-portal-hyprland.service

# 3. 2-in-1 hardware
exec-once = iio-hyprland

# 4. Bitwarden — needs to be running for the SSH agent socket + tray icon
exec-once = bitwarden-desktop

# Restart waybar/swaync on Hyprland reload to pick up colors.conf changes
# (matugen post_hooks already do this, but on plain `hyprctl reload`
# without matugen, this catches our binds / decoration tweaks).
exec = pkill -SIGUSR2 waybar 2>/dev/null
