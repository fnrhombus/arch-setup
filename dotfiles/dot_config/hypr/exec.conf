# Startup — exec-once runs at session start; exec runs on every config reload.
#
# Order matters here: wallpaper-rotate --first MUST run before waybar +
# swaync. They @import colors.css which matugen renders during rotate;
# if waybar starts first, colors.css is missing and waybar exits silently.
# (We also ship a fallback ~/.config/waybar/colors.css and ~/.config/swaync/colors.css
# via chezmoi `create_` files, so even if rotate fails, the bar still
# renders — just with the static placeholder palette.)

# 1. Initial wallpaper + matugen render — sets the colors.css files
#    everything else imports.
exec-once = ~/.local/bin/wallpaper-rotate --first

# 2. Core daemons (depend on colors.css being in place above).
exec-once = waybar
exec-once = swaync
exec-once = awww-daemon
exec-once = wl-paste --watch cliphist store
exec-once = swayosd-server
exec-once = hypridle
exec-once = hyprpolkitagent
exec-once = systemctl --user start xdg-desktop-portal-hyprland.service

# 3. 2-in-1 hardware
exec-once = iio-hyprland

# 4. Bitwarden — needs to be running for the SSH agent socket + tray icon
exec-once = bitwarden-desktop

# Restart waybar/swaync on Hyprland reload to pick up colors.conf changes
# (matugen post_hooks already do this, but on plain `hyprctl reload`
# without matugen, this catches our binds / decoration tweaks).
exec = pkill -SIGUSR2 waybar 2>/dev/null
