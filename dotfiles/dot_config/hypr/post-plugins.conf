# Plugin-specific Hyprland config: bindings, plugin {} blocks, anything
# that would emit a "Invalid dispatcher" / "unknown keyword" error if
# the relevant plugin isn't loaded yet.
#
# This file is NOT sourced from hyprland.conf. The hyprpm bootstrap
# planter (~/.zshrc.d/arch-hyprpm-bootstrap.zsh, planted by
# postinstall.sh §13b) sources it via `hyprctl keyword source ...`
# after running `hyprpm enable`. By the time this file's contents hit
# the Hyprland config parser, the plugins are loaded and every
# reference here resolves cleanly — no sticky red error overlay.

# ---------- hyprexpo (Mission-Control-style workspace overview) -----
plugin {
    hyprexpo {
        columns          = 3
        gap_size         = 5
        bg_col           = $surface
        workspace_method = center current
    }
}

# Workspace overview toggle. issue #138 workaround: dispatch
# workspace,e+0 BEFORE expo,off so focus doesn't get stuck on the
# currently-visible workspace. We only need it on the off-bind.
bind = $mainMod, grave, hyprexpo:expo, toggle

# ---------- hyprgrass (touch gestures) ------------------------------
plugin {
    hyprgrass {
        sensitivity             = 1.0
        workspace_swipe_fingers = 3
        long_press_delay        = 400
        edge_swipe_threshold    = 30

        gestures {
            # Edge-swipe up from bottom → toggle on-screen keyboard
            "edge:b:u" = exec, pgrep -x wvkbd-mobintl >/dev/null && pkill wvkbd-mobintl || wvkbd-mobintl --hidden
        }
    }
}
