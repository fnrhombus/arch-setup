# Decoration — transparency + blur + rounded corners. Matugen-driven colors
# come from colors.conf; this file is just the geometry/effect config.

decoration {
    rounding = 10

    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled       = true
        size          = 6
        passes        = 2
        new_optimizations = true
        ignore_opacity = true
        xray          = false
        noise         = 0.02
        contrast      = 1.0
        brightness    = 1.0
    }

    shadow {
        enabled  = true
        range    = 18
        render_power = 3
        # color = ... set in colors.conf via matugen
    }

    dim_inactive   = false
    dim_strength   = 0.15
    dim_special    = 0.30
}

# Per-app opacity tweaks. Same syntax as hyprland.conf windowrules —
# match props FIRST, then a comma, then the effect with its args.
# Ghostty's actual class is `com.mitchellh.ghostty` (verify with
# `hyprctl clients`); alternation below covers both possibilities.
windowrule = match:class ^(com\.mitchellh\.ghostty|ghostty)$, opacity 0.96 0.92
windowrule = match:class ^(org\.kde\.yazi)$, opacity 0.98 0.94
# windowrule = match:class ^(microsoft-edge|firefox|Code|code-oss)$, opacity 1.0 1.0  # no-op; uncomment to override
