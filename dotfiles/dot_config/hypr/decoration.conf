# Decoration — transparency + blur + rounded corners. Matugen-driven colors
# come from colors.conf; this file is just the geometry/effect config.

decoration {
    rounding = 10

    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    blur {
        enabled       = true
        size          = 6
        passes        = 2
        new_optimizations = true
        ignore_opacity = true
        xray          = false
        noise         = 0.02
        contrast      = 1.0
        brightness    = 1.0
    }

    shadow {
        enabled  = true
        range    = 18
        render_power = 3
        # color = ... set in colors.conf via matugen
    }

    dim_inactive   = false
    dim_strength   = 0.15
    dim_special    = 0.30
}

# Per-app opacity tweaks.
#
# Anchored regex (^(...)$) on the class match plus space-separated rule
# args (`opacity 0.96 0.92`) confuses Hyprland's windowrule parser
# ("invalid field class:^(...)$: missing a value"). Use plain class
# strings (substring match) and one rule per class — no regex
# alternation either, since that interacts the same way.
windowrule = opacity 0.96 0.92, class:ghostty
windowrule = opacity 0.98 0.94, class:org.kde.yazi
windowrule = opacity 1.0 1.0, class:microsoft-edge
windowrule = opacity 1.0 1.0, class:firefox
windowrule = opacity 1.0 1.0, class:Code
windowrule = opacity 1.0 1.0, class:code-oss
