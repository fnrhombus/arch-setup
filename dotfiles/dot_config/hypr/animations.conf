# Animations — medium speed (~200ms), not flashy. Keyboard-ninja default:
# animations confirm actions without slowing them down.

animations {
    enabled = true

    # Bezier curves
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn,  0.25, 1, 0.5, 1
    bezier = overshot,  0.05, 0.9, 0.1, 1.1

    # Durations are in deciseconds (1 = 100ms). 2 ≈ 200ms.
    animation = windows,        1, 2, overshot, slide
    animation = windowsIn,      1, 2, overshot, slide
    animation = windowsOut,     1, 2, smoothOut, slide
    animation = windowsMove,    1, 2, smoothIn
    animation = border,         1, 3, default
    animation = borderangle,    1, 8, default
    animation = fade,           1, 2, smoothIn
    animation = fadeDim,        1, 2, smoothIn
    animation = workspaces,     1, 3, smoothIn, slide
    animation = specialWorkspace, 1, 3, smoothIn, slidevert
}
