# hyprlock — Hyprland-native lockscreen. Auth stack (PIN → fingerprint →
# password) lives at /etc/pam.d/hyprlock and is owned by postinstall §7a.
#
# This file is the visual layout. Colors come from hyprlock.colors.conf
# (matugen-rendered). PAM does the actual auth — hyprlock just collects
# the input string.

source = ~/.config/hypr/hyprlock.colors.conf

general {
    # Current hyprlock `general` accepts: hide_cursor, ignore_empty_input,
    # immediate_render, text_trim, fractional_scaling, screencopy_mode,
    # fail_timeout (wiki Hypr Ecosystem/hyprlock.md).
    #
    # Removed in current schema (no-op if left in):
    #   no_fade_in        — superseded by `--no-fade-in` CLI flag, or override
    #                       `animation = fadeIn, ...` in an `animations { }` block.
    #   grace             — superseded by `--grace SECONDS` CLI flag.
    #   disable_loading_bar — concept removed.
    hide_cursor        = true
    ignore_empty_input = true
}

# Background: current screen contents, blurred. `path = screenshot` tells
# hyprlock to grab via wlr-screencopy at lock time — works regardless of
# whether the wallpaper is set via awww, hyprpaper, or anything else.
# 'blur_passes = 3' = pleasantly diffuse but still visible-as-image.
background {
    monitor =
    path    = screenshot
    blur_passes = 3
    blur_size   = 8
    contrast    = 0.85
    brightness  = 0.7
    vibrancy    = 0.15
    color       = $bg_color
}

# Clock — large, top-center
label {
    monitor    =
    text       = cmd[update:1000] echo "$(date '+%H:%M')"
    color      = $fg_color
    font_size  = 96
    font_family = JetBrainsMono Nerd Font
    position   = 0, -120
    halign     = center
    valign     = top
}

# Date — under the clock
label {
    monitor    =
    text       = cmd[update:60000] echo "$(date '+%A, %B %-d')"
    color      = $fg_color
    font_size  = 22
    font_family = JetBrainsMono Nerd Font
    position   = 0, -260
    halign     = center
    valign     = top
}

# Hostname / user — bottom-left
label {
    monitor    =
    text       = cmd[update:60000] echo "$USER@$(hostname)"
    color      = $accent_dim
    font_size  = 14
    font_family = JetBrainsMono Nerd Font
    position   = 24, 16
    halign     = left
    valign     = bottom
}

# Password / PIN entry — center
input-field {
    monitor       =
    size          = 350, 56
    outline_thickness = 2
    dots_size     = 0.28
    dots_spacing  = 0.4
    dots_center   = true
    outer_color   = $accent
    inner_color   = $surface
    font_color    = $fg_color
    fade_on_empty = false
    placeholder_text = <i>PIN, fingerprint, or password</i>
    hide_input    = false
    rounding      = 12
    check_color   = $accent
    fail_color    = $error
    fail_text     = <i>$FAIL ($ATTEMPTS attempts)</i>
    capslock_color = $error
    position      = 0, 80
    halign        = center
    valign        = bottom
}
