# Default fallback color palette — used until matugen renders a real one
# from the active wallpaper. The `create_` prefix tells chezmoi to write
# this file only when it doesn't already exist, so matugen's runtime
# overwrites are NOT clobbered on the next `chezmoi apply`.
#
# The variables ($primary, $surface, etc.) are referenced from plugins.conf
# (hyprexpo bg_col), input.conf, and Hyprland's general/decoration blocks
# below — without them, Hyprland aborts the entire config parse, leaving
# you with the welcome wizard. Real colors land the first time you change
# wallpaper (`theme-toggle` or `wallpaper-rotate`).

$primary           = rgb(b4befe)
$on_primary        = rgb(1e1e2e)
$primary_container = rgb(45475a)

$secondary         = rgb(cba6f7)
$tertiary          = rgb(94e2d5)
$error             = rgb(f38ba8)

$background        = rgb(1e1e2e)
$surface           = rgb(313244)
$on_surface        = rgb(cdd6f4)
$outline           = rgb(6c7086)

general {
    col.active_border   = $primary $tertiary 45deg
    col.inactive_border = $outline
}

decoration {
    shadow {
        color = rgba(11111baa)
    }
}
