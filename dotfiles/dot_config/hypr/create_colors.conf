# Default fallback color palette — used until matugen renders a real one
# from the active wallpaper. The `create_` prefix tells chezmoi to write
# this file only when it doesn't already exist, so matugen's runtime
# overwrites are NOT clobbered on the next `chezmoi apply`.
#
# Mirrors the layout of matugen/templates/hypr-colors.conf so any
# variable referenced in plugins.conf / input.conf / decoration.conf is
# defined here too. Static dark grey + a static placeholder accent
# (cool-leaning purple) until matugen replaces it with a wallpaper-
# derived one on first wallpaper-rotate.

# ---- Static fills (VS Code Default Dark+) ----
$background         = rgb(1e1e1e)
$surface            = rgb(252526)
$surface_container  = rgb(2d2d30)
$surface_high       = rgb(3c3c3c)
$on_surface         = rgb(d4d4d4)
$on_surface_muted   = rgb(969696)
$outline            = rgb(3c3c3c)
$outline_variant    = rgb(464647)

# ---- Static placeholder accent (replaced by matugen on first run) ----
$primary            = rgb(b4befe)
$on_primary         = rgb(1e1e2e)
$primary_container  = rgb(45475a)
$secondary          = rgb(cba6f7)
$tertiary           = rgb(94e2d5)
$error              = rgb(f38ba8)

general {
    col.active_border   = $primary $tertiary 45deg
    col.inactive_border = $outline
}

decoration {
    shadow {
        color = rgba(000000aa)
    }
}
