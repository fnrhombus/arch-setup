# Workspaces — static + monitor-bound per docs/desktop-requirements.md.
# 1-5 → DP-1 (external Vizio, primary at the desk)
# 6-9 → eDP-1 (internal panel)
# Each eDP-1 workspace has DP-1 as fallback so they migrate cleanly when
# the lid closes (post-battery-replacement; harmless dead path today).
# Workspace 'scratch' is a special workspace, summoned wherever (Super+0).

workspace = 1, monitor:DP-1,  default:true, persistent:true
workspace = 2, monitor:DP-1,                persistent:true
workspace = 3, monitor:DP-1,                persistent:true
workspace = 4, monitor:DP-1,                persistent:true
workspace = 5, monitor:DP-1,                persistent:true

workspace = 6, monitor:eDP-1, default:true, persistent:true
workspace = 7, monitor:eDP-1,               persistent:true
workspace = 8, monitor:eDP-1,               persistent:true
workspace = 9, monitor:eDP-1,               persistent:true

# Special workspace 'scratch' — toggled with Super+0; rules in binds.conf.
workspace = special:scratch, on-created-empty:[float; size 60% 60%; center] ghostty
