# Keybinds — rich custom set per docs/desktop-requirements.md.
# Validator at ~/.local/bin/validate-hypr-binds catches duplicate (MOD, KEY)
# pairs and unknown dispatchers. Cheat sheet at runbook/keybinds.md is
# auto-regenerated from this file.
#
# Convention: SUPER (Mod4) is the primary modifier. SUPER+SHIFT for
# destructive / system-level actions. CTRL+SUPER for less-common nav.

$mainMod = SUPER

# === App quicklaunches ========================================================
bind = $mainMod, Return, exec, ghostty
bind = $mainMod, B,      exec, microsoft-edge-stable
bind = $mainMod, C,      exec, ghostty -e claude
bind = $mainMod, E,      exec, code
bind = $mainMod, F,      exec, nautilus
bind = $mainMod, Y,      exec, ghostty -e yazi
bind = $mainMod, Space,  exec, fuzzel

# === Pickers + utilities ======================================================
bind = $mainMod, V,        exec, cliphist list | fuzzel --dmenu --width 60 | cliphist decode | wl-copy
bind = $mainMod, P,        exec, hyprpicker -an
bind = $mainMod, comma,    exec, ~/.local/bin/control-panel
bind = $mainMod, N,        exec, swaync-client -t -sw
bind = $mainMod, semicolon, exec, fuzzel --dmenu --prompt 'emoji: ' < ~/.cache/emoji-list | wl-copy
# (emoji-list seeded by chezmoi run-once; populate with fzf-emoji or a static set.)

# === Window management ========================================================
bind = $mainMod,        Q, killactive
bind = $mainMod SHIFT,  Q, exec, wleave
bind = $mainMod,        T, togglefloating
bind = $mainMod,        M, togglesplit
bind = $mainMod,        U, fullscreen, 1            # maximize without bar
bind = $mainMod,        F11, fullscreen, 0          # full
bind = $mainMod SHIFT,  P, pin                      # pin floating window
bind = $mainMod,        G, togglegroup              # group windows (tabs)

# Theme + system
bind = $mainMod SHIFT,  T, exec, ~/.local/bin/theme-toggle
bind = $mainMod SHIFT,  H, exec, systemctl hibernate
bind = $mainMod SHIFT,  L, exec, loginctl lock-session
bind = $mainMod SHIFT,  R, exec, hyprctl reload && pkill -SIGRTMIN+8 waybar
bind = $mainMod SHIFT,  W, exec, ~/.local/bin/wallpaper-rotate

# === Focus ====================================================================
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d
bind = $mainMod, h,     movefocus, l
bind = $mainMod, l,     movefocus, r
bind = $mainMod, k,     movefocus, u
bind = $mainMod, j,     movefocus, d

# === Move window ==============================================================
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d
bind = $mainMod SHIFT, h,     movewindow, l
bind = $mainMod SHIFT, l,     movewindow, r
bind = $mainMod SHIFT, k,     movewindow, u
bind = $mainMod SHIFT, j,     movewindow, d

# === Resize submap ============================================================
bind = $mainMod, R, submap, resize
submap = resize
binde = , left,  resizeactive, -20 0
binde = , right, resizeactive,  20 0
binde = , up,    resizeactive,   0 -20
binde = , down,  resizeactive,   0  20
binde = , h,     resizeactive, -20 0
binde = , l,     resizeactive,  20 0
binde = , k,     resizeactive,   0 -20
binde = , j,     resizeactive,   0  20
bind  = , Return, submap, reset
bind  = , Escape, submap, reset
submap = reset

# === Workspaces (static, monitor-bound) =======================================
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, togglespecialworkspace, scratch

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, special:scratch

# Last-workspace toggle
bind = $mainMod, Tab, workspace, previous

# Workspace overview (hyprexpo) — issue #138 workaround:
# dispatch workspace,e+0 BEFORE expo,off so focus doesn't get stuck on
# the currently-visible workspace. We only need it on the off-bind.
bind = $mainMod, grave, hyprexpo:expo, toggle

# === Mouse ====================================================================
bindm = $mainMod, mouse:272, movewindow         # left-click drag = move
bindm = $mainMod, mouse:273, resizewindow       # right-click drag = resize
bind  = $mainMod, mouse_up,   workspace, e+1
bind  = $mainMod, mouse_down, workspace, e-1

# === Media keys (SwayOSD wraps these so the popup shows the new level) ========
bindel = ,XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = ,XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindel = ,XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = ,XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle
bindel = ,XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = ,XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl =  ,XF86AudioPlay,         exec, playerctl play-pause
bindl =  ,XF86AudioNext,         exec, playerctl next
bindl =  ,XF86AudioPrev,         exec, playerctl previous

# === Screenshots (saved to ~/Pictures/Screenshots/) ===========================
bind = ,        Print, exec, hyprshot -m region -o ~/Pictures/Screenshots
bind = SHIFT,   Print, exec, hyprshot -m window -o ~/Pictures/Screenshots
bind = CTRL,    Print, exec, hyprshot -m output -o ~/Pictures/Screenshots
bind = $mainMod, Print, exec, hyprshot -m region --raw | satty --filename - --output-filename ~/Pictures/Screenshots/satty-$(date +%FT%H%M%S).png
