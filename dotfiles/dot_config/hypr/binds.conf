# Keybinds — rich custom set per docs/desktop-requirements.md.
# Validator at ~/.local/bin/validate-hypr-binds catches duplicate (MOD, KEY)
# pairs and unknown dispatchers. Cheat sheet at runbook/keybinds.md is
# auto-regenerated from this file.
#
# Convention: SUPER (Mod4) is the primary modifier. SUPER+SHIFT for
# destructive / system-level actions. CTRL+SUPER for less-common nav.
#
# Every entry uses `bindd` (or its variants binddl / binddel / bindde /
# binddm) — bind-with-description. The description shows up in
# `hyprctl binds -j` as the `description` field, and the
# ~/.local/bin/hypr-cheatsheet popup renders it instead of the raw
# dispatcher+args. New bindings WITHOUT a description are still legal
# (use bare `bind`) but the cheatsheet will show "—" for them.

$mainMod = SUPER

# === App quicklaunches ========================================================
bindd = $mainMod, Return,   Open terminal,                exec, ghostty
bindd = $mainMod, B,        Open browser,                 exec, microsoft-edge-stable
bindd = $mainMod, C,        Open Claude in terminal,      exec, ghostty -e claude
bindd = $mainMod, E,        Open code editor,             exec, code
bindd = $mainMod, F,        Open file manager,            exec, nautilus
bindd = $mainMod, Y,        Open yazi (TUI files),        exec, ghostty -e yazi
bindd = $mainMod, Space,    Open app launcher,            exec, fuzzel

# === Pickers + utilities ======================================================
bindd = $mainMod, V,         Clipboard history picker,     exec, cliphist list | fuzzel --dmenu --width 60 | cliphist decode | wl-copy
bindd = $mainMod, P,         Color picker (eyedropper),    exec, hyprpicker -an
bindd = $mainMod, comma,     Open control panel,           exec, ~/.local/bin/control-panel
bindd = $mainMod, N,         Toggle notification center,   exec, swaync-client -t -sw
bindd = $mainMod, semicolon, Emoji picker (copies to clipboard), exec, fuzzel --dmenu --prompt 'emoji: ' < ~/.cache/emoji-list | wl-copy
bindd = $mainMod, slash,     Show keybinds cheatsheet,     exec, ~/.local/bin/hypr-cheatsheet
# (emoji-list seeded by chezmoi run-once; populate with fzf-emoji or a static set.)

# === Window management ========================================================
bindd = $mainMod,        Q,   Close active window,           killactive
bindd = $mainMod SHIFT,  Q,   Logout / shutdown menu,        exec, wleave
bindd = $mainMod,        T,   Toggle tiled / floating,       togglefloating
bindd = $mainMod,        M,   Toggle horizontal / vertical split, togglesplit
bindd = $mainMod,        U,   Maximize (no bar),             fullscreen, 1
bindd = $mainMod,        F11, Fullscreen (true),             fullscreen, 0
bindd = $mainMod SHIFT,  P,   Pin floating window (sticky),  pin
bindd = $mainMod,        G,   Toggle window grouping (tabs), togglegroup

# === Layouts (workspace-wide) =================================================
# Per-window toggles above (Super+T floating, Super+G group/tabs) flip just
# the focused window. These workspace-wide flavors hit every window in the
# active workspace — useful for switching the whole layout at once.
bindd = $mainMod ALT, T, Layout: tile all windows (dwindle),  exec, ~/.local/bin/hypr-layout-tiling
bindd = $mainMod ALT, F, Layout: float all windows,           exec, ~/.local/bin/hypr-layout-floating
bindd = $mainMod ALT, B, Layout: tab all windows (group),     exec, ~/.local/bin/hypr-layout-tabbed
# Super+Alt+S reserved for "scrolling layout" once hyprscroller plugin lands
# (`hyprpm add https://github.com/dawsers/hyprscroller && hyprpm enable scroller`).

# Theme + system
bindd = $mainMod SHIFT,  T,   Cycle dark/light theme,        exec, ~/.local/bin/theme-toggle
bindd = $mainMod SHIFT,  H,   Hibernate the system,          exec, systemctl hibernate
bindd = $mainMod SHIFT,  L,   Lock the screen,               exec, loginctl lock-session
bindd = $mainMod SHIFT,  R,   Reload Hyprland + waybar,      exec, hyprctl reload && pkill -SIGRTMIN+8 waybar
bindd = $mainMod SHIFT,  W,   Rotate wallpaper (pick accent), exec, ghostty -e ~/.local/bin/wallpaper-rotate
bindd = $mainMod SHIFT,  B,   Toggle waybar visibility,      exec, pkill -SIGUSR1 waybar

# === Focus ====================================================================
bindd = $mainMod, left,  Focus window left,    movefocus, l
bindd = $mainMod, right, Focus window right,   movefocus, r
bindd = $mainMod, up,    Focus window up,      movefocus, u
bindd = $mainMod, down,  Focus window down,    movefocus, d
bindd = $mainMod, h,     Focus window left (vim),    movefocus, l
bindd = $mainMod, l,     Focus window right (vim),   movefocus, r
bindd = $mainMod, k,     Focus window up (vim),      movefocus, u
bindd = $mainMod, j,     Focus window down (vim),    movefocus, d

# === Move window ==============================================================
bindd = $mainMod SHIFT, left,  Move window left,    movewindow, l
bindd = $mainMod SHIFT, right, Move window right,   movewindow, r
bindd = $mainMod SHIFT, up,    Move window up,      movewindow, u
bindd = $mainMod SHIFT, down,  Move window down,    movewindow, d
bindd = $mainMod SHIFT, h,     Move window left (vim),    movewindow, l
bindd = $mainMod SHIFT, l,     Move window right (vim),   movewindow, r
bindd = $mainMod SHIFT, k,     Move window up (vim),      movewindow, u
bindd = $mainMod SHIFT, j,     Move window down (vim),    movewindow, d

# === Resize submap ============================================================
bindd = $mainMod, R, Enter resize mode (arrows/hjkl resize - Esc exits), submap, resize
submap = resize
bindde = , left,  Resize -20px wide,  resizeactive, -20 0
bindde = , right, Resize +20px wide,  resizeactive,  20 0
bindde = , up,    Resize -20px tall,  resizeactive,   0 -20
bindde = , down,  Resize +20px tall,  resizeactive,   0  20
bindde = , h,     Resize -20px wide (vim),  resizeactive, -20 0
bindde = , l,     Resize +20px wide (vim),  resizeactive,  20 0
bindde = , k,     Resize -20px tall (vim),  resizeactive,   0 -20
bindde = , j,     Resize +20px tall (vim),  resizeactive,   0  20
bindd  = , Return, Exit resize mode, submap, reset
bindd  = , Escape, Exit resize mode, submap, reset
submap = reset

# === Workspaces (static, monitor-bound) =======================================
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Toggle scratchpad workspace, togglespecialworkspace, scratch

bindd = $mainMod SHIFT, 1, Move window -> workspace 1, movetoworkspacesilent, 1
bindd = $mainMod SHIFT, 2, Move window -> workspace 2, movetoworkspacesilent, 2
bindd = $mainMod SHIFT, 3, Move window -> workspace 3, movetoworkspacesilent, 3
bindd = $mainMod SHIFT, 4, Move window -> workspace 4, movetoworkspacesilent, 4
bindd = $mainMod SHIFT, 5, Move window -> workspace 5, movetoworkspacesilent, 5
bindd = $mainMod SHIFT, 6, Move window -> workspace 6, movetoworkspacesilent, 6
bindd = $mainMod SHIFT, 7, Move window -> workspace 7, movetoworkspacesilent, 7
bindd = $mainMod SHIFT, 8, Move window -> workspace 8, movetoworkspacesilent, 8
bindd = $mainMod SHIFT, 9, Move window -> workspace 9, movetoworkspacesilent, 9
bindd = $mainMod SHIFT, 0, Move window -> scratchpad, movetoworkspacesilent, special:scratch

bindd = $mainMod, Tab, Switch to last workspace, workspace, previous

# Workspace overview (hyprexpo) lives in post-plugins.conf — sourced
# at runtime by the hyprpm bootstrap planter AFTER the plugin loads,
# so the initial Hyprland config parse never sees the unknown
# 'hyprexpo:expo' dispatcher and doesn't raise the sticky red error
# overlay.

# === Mouse ====================================================================
binddm = $mainMod, mouse:272, Drag to move window,    movewindow
binddm = $mainMod, mouse:273, Drag to resize window,  resizewindow
bindd  = $mainMod, mouse_up,   Switch to next workspace,     workspace, e+1
bindd  = $mainMod, mouse_down, Switch to previous workspace, workspace, e-1

# === Media keys (SwayOSD wraps these so the popup shows the new level) ========
binddel = ,XF86AudioRaiseVolume,  Volume up,                   exec, swayosd-client --output-volume raise
binddel = ,XF86AudioLowerVolume,  Volume down,                 exec, swayosd-client --output-volume lower
binddel = ,XF86AudioMute,         Mute / unmute output,        exec, swayosd-client --output-volume mute-toggle
binddel = ,XF86AudioMicMute,      Mute / unmute mic,           exec, swayosd-client --input-volume mute-toggle
binddel = ,XF86MonBrightnessUp,   Brightness up,               exec, swayosd-client --brightness raise
binddel = ,XF86MonBrightnessDown, Brightness down,             exec, swayosd-client --brightness lower
binddl =  ,XF86AudioPlay,         Play / pause media,          exec, playerctl play-pause
binddl =  ,XF86AudioNext,         Next track,                  exec, playerctl next
binddl =  ,XF86AudioPrev,         Previous track,              exec, playerctl previous

# === Screenshots (saved to ~/Pictures/Screenshots/) ===========================
bindd = ,        Print, Screenshot region,                exec, hyprshot -m region -o ~/Pictures/Screenshots
bindd = SHIFT,   Print, Screenshot active window,         exec, hyprshot -m window -o ~/Pictures/Screenshots
bindd = CTRL,    Print, Screenshot full screen (output),  exec, hyprshot -m output -o ~/Pictures/Screenshots
bindd = $mainMod, Print, Screenshot region -> annotate (satty), exec, hyprshot -m region --raw | satty --filename - --output-filename ~/Pictures/Screenshots/satty-$(date +%FT%H%M%S).png
