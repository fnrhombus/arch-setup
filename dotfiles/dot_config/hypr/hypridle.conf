# hypridle — idle action daemon. 30-min lock + DPMS-off per
# docs/desktop-requirements.md. No idle-hibernate (user invokes manually
# via Super+Shift+H or fuzzel control-panel).

general {
    # XDPH + hyprlock + dpms-off has an unresolved crash bug (XDPH segfaults
    # in libwayland-client during CCWlOutput cleanup, leaves the desktop
    # unresponsive on resume). Mitigation per Arch BBS #308227 + XDPH#62:
    # 1) Ensure lock fires BEFORE dpms (which the listener ordering does)
    # 2) Set explicit unlock_cmd that fires an activity event (notify-send),
    #    which re-arms the portal connection
    # 3) Don't ignore inhibits (gives wlroots a chance to abort the dpms
    #    transition if something else is mid-flight)
    lock_cmd            = pidof hyprlock || hyprlock
    unlock_cmd          = notify-send -t 1500 "unlocked"
    before_sleep_cmd    = loginctl lock-session
    after_sleep_cmd     = hyprctl dispatch dpms on
    ignore_dbus_inhibit    = false
    ignore_systemd_inhibit = false
}

# 30 min idle → screen lock
listener {
    timeout       = 1800
    on-timeout    = loginctl lock-session
}

# 30 min idle → display power off (same threshold; lock fires fractionally first)
listener {
    timeout       = 1801
    on-timeout    = hyprctl dispatch dpms off
    on-resume     = hyprctl dispatch dpms on
}
