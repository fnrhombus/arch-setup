# hypridle — idle action daemon. 30-min lock + DPMS-off per
# docs/desktop-requirements.md. No idle-hibernate (user invokes manually
# via Super+Shift+H or fuzzel control-panel).

general {
    lock_cmd       = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# 30 min idle → screen lock
listener {
    timeout       = 1800
    on-timeout    = loginctl lock-session
}

# 30 min idle → display power off (same threshold; lock fires fractionally first)
listener {
    timeout       = 1801
    on-timeout    = hyprctl dispatch dpms off
    on-resume     = hyprctl dispatch dpms on
}
