# Input — keyboard, touchpad, touch, tablet.

input {
    kb_layout  = us
    kb_options = compose:ralt
    repeat_rate  = 40
    repeat_delay = 250

    # NumLock on by default (numpad types digits, not navigation arrows).
    # Hyprland default is false, which leaves the numpad in arrow-key mode
    # and made every boot feel "wrong". Flip to false here if you'd rather
    # NumLock be off by default.
    numlock_by_default = true

    follow_mouse = 0          # 0 = click-to-focus (no FFM surprises)
    accel_profile = adaptive

    touchpad {
        natural_scroll      = true
        tap-to-click        = true
        tap-and-drag        = true
        clickfinger_behavior = true
        scroll_factor       = 0.4
        disable_while_typing = true
    }

    touchdevice {
        enabled = true
    }

    tablet {
        # Wacom AES digitizer — bound to the internal panel; rotation follows iio.
        output = eDP-1
    }
}

gestures {
    # Hyprland removed `workspace_swipe` and `workspace_swipe_fingers` in favor of
    # the new gestures system (wiki Variables.md gestures section, explicit NOTE).
    # Replacement: a top-level `gesture = N, DIRECTION, ACTION` keyword.
    # `workspace_swipe_invert` and `workspace_swipe_min_speed_to_force` are still valid.
    workspace_swipe_invert             = true
    workspace_swipe_min_speed_to_force = 5
}

# 3-finger horizontal touchpad swipe → switch workspace (replaces the removed
# workspace_swipe / workspace_swipe_fingers keys).
gesture = 3, horizontal, workspace

cursor {
    inactive_timeout = 5
    no_warps         = false
    persistent_warps = true
}

# hyprgrass touch-gesture config lives in post-plugins.conf — sourced
# at runtime by the hyprpm bootstrap planter AFTER the plugin loads.
# See plugins.conf for the rationale.
