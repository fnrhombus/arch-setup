# Hyprland config — entry point. Sources fragment files for legibility.
# All configs are Claude-authored, managed by chezmoi. Theme = matugen.

source = ~/.config/hypr/colors.conf       # matugen-rendered (rgb vars + general/decoration overrides)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/decoration.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/plugins.conf
source = ~/.config/hypr/exec.conf
source = ~/.config/hypr/binds.conf

general {
    layout      = dwindle
    gaps_in     = 4
    gaps_out    = 8
    border_size = 2
    # col.* set by colors.conf
    resize_on_border = true
    allow_tearing    = false
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
}

misc {
    disable_hyprland_logo  = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    vfr                     = true
    enable_swallow          = false
    focus_on_activate       = true
    # Hyprland renamed `new_window_takes_over_fullscreen` → `on_focus_under_fullscreen`
    # (wiki Variables.md misc section). Same int domain (0=ignore, 1=takeover, 2=unfullscreen).
    on_focus_under_fullscreen = 2
}

# Window rules — keep narrow + matugen-friendly. Specific apps tuned over time.
# Hyprland unified `windowrulev2` into `windowrule` (wiki Window-Rules.md, current).
# Syntax: `windowrule = EFFECT, MATCHKEY:PATTERN[, MATCHKEY:PATTERN...]`
# where MATCHKEY is one of class / title / initialClass / initialTitle / tag /
# xwayland / etc. (NO `match:` prefix — that was an earlier misread of the docs
# and made Hyprland parse the entire arg list as garbage, raising "invalid
# field float: missing a value" errors on every windowrule line.)
windowrule = float, class:^(pavucontrol|pwvucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(nwg-displays)$
windowrule = float, class:^(blueman-manager|overskride)$
windowrule = float, class:^(org\.gnome\.Calculator)$
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin,   title:^(Picture-in-Picture)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
# Bitwarden popup window from extensions
windowrule = float, class:^(bitwarden|Bitwarden)$
