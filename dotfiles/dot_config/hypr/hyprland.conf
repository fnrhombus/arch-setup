# Hyprland config — entry point. Sources fragment files for legibility.
# All configs are Claude-authored, managed by chezmoi. Theme = matugen.

source = ~/.config/hypr/colors.conf       # matugen-rendered (rgb vars + general/decoration overrides)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/decoration.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/plugins.conf
source = ~/.config/hypr/exec.conf
source = ~/.config/hypr/binds.conf

general {
    layout      = dwindle
    gaps_in     = 4
    gaps_out    = 8
    border_size = 2
    # col.* set by colors.conf
    resize_on_border = true
    allow_tearing    = false
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
}

misc {
    disable_hyprland_logo  = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    vfr                     = true
    enable_swallow          = false
    focus_on_activate       = true
    new_window_takes_over_fullscreen = 2
}

# Window rules — keep narrow + matugen-friendly. Specific apps tuned over time.
# Hyprland unified `windowrulev2` into `windowrule` (wiki Window-Rules.md, current).
# Syntax: `windowrule = EFFECT, match:PROP value, ...` — match: prefix is required;
# effects (float, pin, opacity ...) come first.
windowrule = float, match:class pavucontrol|pwvucontrol
windowrule = float, match:class nm-connection-editor
windowrule = float, match:class nwg-displays
windowrule = float, match:class blueman-manager|overskride
windowrule = float, match:class org\.gnome\.Calculator
windowrule = float, match:title Picture-in-Picture
windowrule = pin,   match:title Picture-in-Picture
windowrule = float, match:class xdg-desktop-portal-gtk
# Bitwarden popup window from extensions
windowrule = float, match:class bitwarden|Bitwarden
