# Hyprland config — entry point. Sources fragment files for legibility.
# All configs are Claude-authored, managed by chezmoi. Theme = matugen.

source = ~/.config/hypr/colors.conf       # matugen-rendered (rgb vars + general/decoration overrides)
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/decoration.conf
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/plugins.conf
source = ~/.config/hypr/exec.conf
source = ~/.config/hypr/binds.conf

general {
    layout      = dwindle
    gaps_in     = 4
    gaps_out    = 8
    border_size = 2
    # col.* set by colors.conf
    resize_on_border = true
    allow_tearing    = false
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
}

misc {
    disable_hyprland_logo  = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    vfr                     = true
    enable_swallow          = false
    focus_on_activate       = true
    # Hyprland renamed `new_window_takes_over_fullscreen` → `on_focus_under_fullscreen`
    # (wiki Variables.md misc section). Same int domain (0=ignore, 1=takeover, 2=unfullscreen).
    on_focus_under_fullscreen = 2
}

# Window rules — keep narrow + matugen-friendly. Specific apps tuned over time.
#
# Hyprland's current windowrule syntax (post-windowrulev2 deprecation, per
# https://wiki.hypr.land/Configuring/Window-Rules/):
#     windowrule = match:PROP REGEX[, match:PROP REGEX...], EFFECT [args]
#
# MATCH PROPS COME FIRST, then a comma, then the effect with its args.
# Effects are: float, tile, fullscreen, maximize, opacity, pin, etc.
# Every `match:PROP value` uses a SPACE between PROP and value (not `:`,
# not `=`). REGEX uses Google RE2; backslash-escape literal dots.
windowrule = match:class ^(pavucontrol|pwvucontrol)$, float
windowrule = match:class ^(nm-connection-editor)$, float
windowrule = match:class ^(nwg-displays)$, float
windowrule = match:class ^(blueman-manager|overskride)$, float
windowrule = match:class ^(org\.gnome\.Calculator)$, float
windowrule = match:title ^(Picture-in-Picture)$, float
windowrule = match:title ^(Picture-in-Picture)$, pin
windowrule = match:class ^(xdg-desktop-portal-gtk)$, float
# Bitwarden popup window from extensions
windowrule = match:class ^(bitwarden|Bitwarden)$, float
