# Monitor layout — locked per docs/decisions.md and nwg-displays calibration.
# DP-1 (Vizio V505-G9, 4K, scale 1.5) is primary at top-left.
# eDP-1 (internal) sits below, scale 1, at the X=0 edge so the cursor flows.

monitor = DP-1,  preferred, 0x0,    1.5
monitor = eDP-1, preferred, 0x1440, 1
# Tablet-mode rotation is driven by iio-hyprland (started from exec.conf).
# Manual `,transform,N` overrides if needed; auto-rotate handles the common case.

# Fallback: any unknown monitor → preferred mode at origin, scale 1.
monitor = , preferred, auto, 1
