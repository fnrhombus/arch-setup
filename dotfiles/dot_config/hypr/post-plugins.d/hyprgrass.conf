# hyprgrass (touch gesture engine for the 2-in-1).
#
# Sourced at runtime by the hyprpm bootstrap planter via
# `hyprctl keyword source ...` AFTER `hyprpm enable hyprgrass` succeeds.
# Skipped entirely (planter never sources this file) when the build
# fails — touch gestures are nice-to-have, not load-bearing, so a
# build failure on a Hyprland API bump shouldn't drag down anything else.

plugin {
    hyprgrass {
        sensitivity             = 1.0
        workspace_swipe_fingers = 3
        long_press_delay        = 400
        edge_swipe_threshold    = 30

        gestures {
            # Edge-swipe up from bottom → toggle on-screen keyboard
            "edge:b:u" = exec, pgrep -x wvkbd-mobintl >/dev/null && pkill wvkbd-mobintl || wvkbd-mobintl --hidden
        }
    }
}
