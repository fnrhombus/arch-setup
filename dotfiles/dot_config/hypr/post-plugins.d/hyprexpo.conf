# hyprexpo (Mission-Control-style workspace overview).
#
# Sourced at runtime by the hyprpm bootstrap planter via
# `hyprctl keyword source ...` AFTER `hyprpm enable hyprexpo` succeeds.
# NOT sourced from hyprland.conf — see post-plugins.d/README rationale.

plugin {
    hyprexpo {
        columns          = 3
        gap_size         = 5
        bg_col           = $surface
        workspace_method = center current
    }
}

# Workspace overview toggle. issue #138 workaround: dispatch
# workspace,e+0 BEFORE expo,off so focus doesn't get stuck on the
# currently-visible workspace. We only need it on the off-bind.
bind = $mainMod, grave, hyprexpo:expo, toggle
