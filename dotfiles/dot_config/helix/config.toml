# Helix — modal editor. Theme is matugen-rendered to themes/matugen.toml.

theme = "matugen"

[editor]
line-number   = "relative"
mouse         = true
cursorline    = true
cursorcolumn  = false
auto-pairs    = true
auto-completion = true
auto-format   = true
auto-save     = false
idle-timeout  = 250
completion-trigger-len = 2
completion-replace = false
true-color    = true
bufferline    = "multiple"
color-modes   = true

[editor.lsp]
enable                = true
display-messages      = true
display-inlay-hints   = true
auto-signature-help   = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden        = false
follow-symlinks = true
git-ignore    = true

[editor.statusline]
left   = ["mode", "spinner", "version-control", "file-name"]
center = ["file-modification-indicator"]
right  = ["diagnostics", "selections", "register", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"
mode.insert = "INSERT"
mode.select = "SELECT"

[editor.indent-guides]
render    = true
character = "▏"
skip-levels = 1

[editor.soft-wrap]
enable    = true
max-wrap  = 25
max-indent-retain = 0
wrap-indicator = "↪ "

[editor.whitespace.render]
space    = "none"
tab      = "all"
nbsp     = "all"
newline  = "none"

[editor.whitespace.characters]
space    = "·"
nbsp     = "⍽"
tab      = "→"
newline  = "⏎"

[keys.normal]
# Quick save / quit
"C-s" = ":w"
# tmux-like pane nav (when split)
"C-h" = "jump_view_left"
"C-j" = "jump_view_down"
"C-k" = "jump_view_up"
"C-l" = "jump_view_right"

[keys.insert]
"C-s" = [":w", "normal_mode"]
