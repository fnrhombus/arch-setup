[Appearance]
color_scheme_path=~/.config/qt5ct/colors/matugen.conf
custom_palette=true
icon_theme=Papirus-Dark
standard_dialogs=default
style=Fusion
; Why Fusion not kvantum: kvantum requires the kvantum + kvantum-qt5
; packages installed; without them qt5ct does NOT silently fall back —
; Qt apps render with raw defaults. Fusion is built-in to Qt and
; honors the matugen-generated color_scheme_path above. If you later
; install kvantum and a matugen-themed kvantum theme, switch to
; style=kvantum.

