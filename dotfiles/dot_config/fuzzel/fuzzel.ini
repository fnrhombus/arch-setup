# fuzzel — app launcher + dmenu host (clipboard picker, control panel,
# emoji picker, etc.). Colors come from colors.ini (matugen-rendered)
# via include= line.

include=~/.config/fuzzel/colors.ini

[main]
font=JetBrainsMono Nerd Font:size=12
dpi-aware=auto
prompt="❯ "
icon-theme=Papirus-Dark
icons-enabled=yes
fields=name,generic,comment,categories,filename,keywords
terminal=ghostty -e
launch-prefix=
output=
fuzzy=yes
show-actions=no
list-executables-in-path=no
width=40
horizontal-pad=20
vertical-pad=12
inner-pad=4
line-height=24
letter-spacing=0
tabs=8
exit-on-keyboard-focus-loss=yes
match-counter=no
filter-desktop=no
match-mode=fzf

[dmenu]
exit-immediately-if-empty=no
mode=text

[key-bindings]
cancel=Escape Control+g Control+c
execute=Return KP_Enter Control+y
execute-or-next=Tab
delete-prev=BackSpace Control+h
delete-prev-word=Mod1+BackSpace Control+w
delete-next=Delete Control+d
prev=Up Control+p
next=Down Control+n
first=Control+Home
last=Control+End

# Border config (radius/width come from colors.ini matugen output)
