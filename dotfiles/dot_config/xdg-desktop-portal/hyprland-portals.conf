# Pin xdg-desktop-portal preferences for Hyprland sessions.
# Without this file, portal selection is non-deterministic when multiple
# portal implementations are installed (race condition on portal D-Bus
# activation), which can cause file-picker dialogs to fail to appear.
#
# Hyprland's own portal handles screen capture, screenshot, and most
# wayland-specific bits. xdg-desktop-portal-gtk is required for
# FileChooser (XDPH does not implement it).

[preferred]
default = hyprland;gtk
org.freedesktop.impl.portal.FileChooser = gtk
org.freedesktop.impl.portal.AppChooser  = gtk
org.freedesktop.impl.portal.Settings    = hyprland;gtk
