# tmux — Claude Code workspace shell (worktree-per-session via sesh).
# Theme: matugen colors via ~/.config/tmux/colors.conf, regenerated on each
# wallpaper change. Reload: `prefix + R`.

# ---- prefix ----------------------------------------------------------------
# Ctrl+a, carried from fnwsl. Frees Ctrl+b for emacs-style word-back in
# bash/zsh and is faster on US-QWERTY than the default.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- behavior --------------------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0          # zero-delay <Esc> in helix/vim splits
set -g focus-events on        # propagate focus to clients (helix, claude)

# ---- terminal --------------------------------------------------------------
# tmux-256color is the right TERM for tmux-inside (avoids the screen-* hacks).
# Override RGB for Ghostty + xterm-class so true-color in helix/claude works.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"

# ---- splits + windows ------------------------------------------------------
# Open in the pane's CWD (matches Claude Code worktree workflow — each
# worktree session lives at its own path; new splits inherit it).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# ---- reload ----------------------------------------------------------------
bind R source-file ~/.tmux.conf \; display "tmux reloaded"

# ---- status line -----------------------------------------------------------
set -g status-left  "[#S] "
set -g status-left-length 30
set -g status-right "%H:%M %d-%b "
set -g status-right-length 30

# ---- matugen-rendered colors ----------------------------------------------
# `-q` = silently no-op if the file doesn't exist yet (first boot, before
# matugen has run). matugen's post_hook re-sources this on every render.
source -q ~/.config/tmux/colors.conf
